name: Build Executables

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            requirements_file: requirements/linux.txt
            artifact_name: PerfMonitor-linux
          - os: windows-latest
            requirements_file: requirements/windows.txt
            artifact_name: PerfMonitor-windows
          - os: macos-latest
            requirements_file: requirements/macos.txt
            artifact_name: PerfMonitor-macos
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ matrix.requirements_file }}
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --clean --onefile --windowed --collect-all PySide6 --name PerfMonitor "main.py"
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/PerfMonitor*

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create archives
      run: |
        cd artifacts
        for d in */; do
          name="${d%/}"
          tar -czf "${name}.tar.gz" "$name"
        done

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*.tar.gz
        generate_release_notes: true
