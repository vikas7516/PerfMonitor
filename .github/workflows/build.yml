name: Build Executables

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            requirements_file: requirements/linux.txt
            artifact_name: PerfMonitor-linux
          - os: windows-latest
            requirements_file: requirements/windows.txt
            artifact_name: PerfMonitor-windows
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ matrix.requirements_file }}
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --clean --onefile --windowed --strip --optimize 2 \
          --name PerfMonitor \
          --hidden-import PySide6.QtCore \
          --hidden-import PySide6.QtGui \
          --hidden-import PySide6.QtWidgets \
          --exclude-module tkinter \
          --exclude-module _tkinter \
          --exclude-module pystray \
          --exclude-module PIL \
          --exclude-module win32gui \
          --exclude-module win32process \
          --exclude-module PySide6.QtQml \
          --exclude-module PySide6.QtQuick \
          --exclude-module PySide6.QtWebEngineCore \
          --exclude-module PySide6.QtWebEngineWidgets \
          --exclude-module PySide6.QtWebChannel \
          --exclude-module PySide6.Qt3DCore \
          --exclude-module PySide6.QtPdf \
          --exclude-module PySide6.QtMultimedia \
          --exclude-module PySide6.QtBluetooth \
          --exclude-module PySide6.QtNfc \
          --exclude-module PySide6.QtSql \
          --exclude-module PySide6.QtTest \
          --exclude-module PySide6.QtHelp \
          --exclude-module PySide6.QtSvg \
          --exclude-module PySide6.QtHttpServer \
          "main.py"
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/PerfMonitor*

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create archives
      run: |
        cd artifacts
        for d in */; do
          name="${d%/}"
          tar -czf "${name}.tar.gz" "$name"
        done

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*.tar.gz
        generate_release_notes: true
